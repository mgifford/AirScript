name: Accessibility CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse quality gate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Run Lighthouse CI assertions
        run: npm run test:lighthouse

      - name: Upload Lighthouse artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseci-report
          path: .lighthouseci
          if-no-files-found: ignore
