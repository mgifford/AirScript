<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirScript Demo Landing</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: linear-gradient(160deg, #f8fafc 0%, #e0f2fe 45%, #fefce8 100%);
      --ink: #0f172a;
      --muted: #334155;
      --panel: #ffffff;
      --border: rgba(15, 23, 42, 0.12);
      --accent: #0b5f59;
      --accent-text: #ffffff;
      --button-bg: #ffffff;
      --button-text: #0f172a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: radial-gradient(circle at top, #16314b 0%, #06111c 45%, #02050a 100%);
        --ink: #f8fafc;
        --muted: #d5e7f6;
        --panel: #08131f;
        --border: rgba(191, 212, 229, 0.2);
        --accent: #d4a800;
        --accent-text: #111827;
        --button-bg: #0f1c2e;
        --button-text: #f8fafc;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      padding: 1.5rem;
      display: grid;
      place-items: center;
    }

    main {
      width: min(100%, 60rem);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      background: var(--panel);
      padding: 1.5rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      display: grid;
      gap: 1rem;
    }

    h1 {
      margin: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 999px;
      padding: 0.75rem 1rem;
      text-decoration: none;
      font-weight: 800;
      border: 1px solid var(--border);
      color: var(--button-text);
      background: var(--button-bg);
    }

    a.primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: transparent;
    }

    code {
      font-family: "SF Mono", "Menlo", monospace;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>AirScript</h1>
    <p>Start with the demo pages below. No setup reading is required to see the interface.</p>
    <div class="actions">
      <a class="primary" href="./demo/">Open Demo</a>
      <a href="./demo/speaker.html">Open Speaker Console</a>
      <a href="./local-setup.html">Local Install And Setup</a>
      <a href="./mac-internet-sharing.html">Mac Internet Sharing Guide</a>
      <a href="./demo/index.html">Open Canonical Demo URL</a>
    </div>
    <p>Share this URL for audience phones: <code>./demo/</code></p>
  </main>
</body>
</html>
